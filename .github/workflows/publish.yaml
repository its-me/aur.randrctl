name: Publish to AUR

on:
  workflow_dispatch:
    inputs:
      commit_message:
        description: "Commit message (optional)"
        required: false

jobs:
  publish:
    runs-on: ubuntu-slim
    environment:
      name: AUR
      url: https://aur.archlinux.org/packages/randrctl

    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Publish
        uses: its-me/action.aur.publish@v0
        with:
          ssh-key: ${{ secrets.AUR_SSH_KEY }}
          commit-message: ${{ github.event.inputs.commit_message }}
